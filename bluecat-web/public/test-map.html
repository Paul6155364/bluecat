<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>腾讯地图 Key 测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1890ff;
        }
        .status {
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
        }
        .error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
        }
        .info {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            color: #1890ff;
        }
        #mapContainer {
            width: 100%;
            height: 400px;
            margin: 20px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #1890ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #40a9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ 腾讯地图 Key 测试页面</h1>
        
        <div class="status info">
            <strong>测试 Key:</strong> Q5ABZ-HSL34-JTBUE-D2PW4-ZKK76-MCBJA
        </div>
        
        <div id="statusBox" class="status info">
            <strong>状态:</strong> 准备加载地图...
        </div>
        
        <button onclick="testKey()">🔍 测试 Key 有效性</button>
        <button onclick="loadMap()">🗺️ 加载地图</button>
        
        <div id="mapContainer"></div>
        
        <div id="console"></div>
    </div>

    <script>
        const TMAP_KEY = 'Q5ABZ-HSL34-JTBUE-D2PW4-ZKK76-MCBJA';
        let map = null;

        function log(message, type = 'info') {
            const consoleDiv = document.getElementById('console');
            const statusBox = document.getElementById('statusBox');
            
            console.log(message);
            
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong> ${message}`;
            consoleDiv.insertBefore(div, consoleDiv.firstChild);
            
            statusBox.className = `status ${type}`;
            statusBox.innerHTML = `<strong>状态:</strong> ${message}`;
        }

        // 测试 Key 有效性
        async function testKey() {
            log('开始测试 Key 有效性...', 'info');
            
            try {
                const response = await fetch(`https://apis.map.qq.com/ws/location/v1/ip?key=${TMAP_KEY}`);
                const data = await response.json();
                
                console.log('API 返回:', data);
                
                if (data.status === 0) {
                    log('✅ Key 有效！可以正常使用', 'success');
                } else {
                    log(`❌ Key 无效或配额超限: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ 测试失败: ${error.message}`, 'error');
            }
        }

        // 加载地图
        function loadMap() {
            log('开始加载地图 SDK...', 'info');
            
            // 检查是否已加载
            if (window.TMap) {
                initMap();
                return;
            }

            // 动态加载
            const script = document.createElement('script');
            script.src = `https://map.qq.com/api/gljs?v=1.exp&key=${TMAP_KEY}&callback=initMap`;
            
            script.onerror = function() {
                log('❌ 地图 SDK 加载失败，请检查网络或 Key 配置', 'error');
            };
            
            document.head.appendChild(script);
            log('正在加载腾讯地图 SDK...', 'info');
        }

        // 初始化地图
        function initMap() {
            try {
                log('地图 SDK 加载成功，开始创建地图实例...', 'success');
                
                if (!window.TMap) {
                    throw new Error('TMap 对象未定义');
                }

                map = new TMap.Map('mapContainer', {
                    center: new TMap.LatLng(30.67, 104.06),
                    zoom: 12,
                    viewMode: '2D'
                });

                log('✅ 地图创建成功！Key 配置正确', 'success');
                
                // 添加点击事件
                map.on('click', function(evt) {
                    const lat = evt.latLng.getLat().toFixed(4);
                    const lng = evt.latLng.getLng().toFixed(4);
                    log(`📍 点击位置: 经度 ${lng}, 纬度 ${lat}`, 'success');
                });

            } catch (error) {
                log(`❌ 地图创建失败: ${error.message}`, 'error');
                console.error(error);
            }
        }

        // 页面加载后自动测试
        window.onload = function() {
            log('页面加载完成，点击按钮测试 Key 或加载地图', 'info');
        };
    </script>
</body>
</html>
